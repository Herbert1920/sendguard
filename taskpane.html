<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SendGuard – הגדרות</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --surface2: #1e242d;
      --border: #2a3140;
      --accent: #f0a500;
      --accent-dim: rgba(240,165,0,0.12);
      --danger: #e05252;
      --danger-dim: rgba(224,82,82,0.1);
      --safe: #4caf82;
      --safe-dim: rgba(76,175,130,0.1);
      --text: #e8edf5;
      --text-muted: #7a8899;
      --text-dim: #4a5568;
      --whitelist-color: #4caf82;
      --blacklist-color: #e05252;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Heebo', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 18px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .shield { font-size: 20px; }

    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* Mode selector */
    .mode-section {
      padding: 14px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mode-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .mode-options {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      flex: 1;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: 'Heebo', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.3;
    }

    .mode-btn.active-always {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .mode-btn.active-whitelist {
      border-color: var(--whitelist-color);
      background: var(--safe-dim);
      color: var(--whitelist-color);
    }

    .mode-btn.active-blacklist {
      border-color: var(--blacklist-color);
      background: var(--danger-dim);
      color: var(--blacklist-color);
    }

    /* Lists area */
    .lists-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .lists-area::-webkit-scrollbar { width: 3px; }
    .lists-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* List section */
    .list-section {
      margin-bottom: 20px;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid;
    }

    .list-badge.whitelist {
      color: var(--whitelist-color);
      border-color: var(--whitelist-color);
      background: var(--safe-dim);
    }

    .list-badge.blacklist {
      color: var(--blacklist-color);
      border-color: var(--blacklist-color);
      background: var(--danger-dim);
    }

    .list-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .list-count {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Add input row */
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      color: var(--text);
      direction: ltr;
      text-align: left;
      transition: border-color 0.15s;
      outline: none;
    }

    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-dim); }

    .add-input.whitelist-input:focus { border-color: var(--whitelist-color); }
    .add-input.blacklist-input:focus { border-color: var(--blacklist-color); }

    .add-btn {
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-family: 'Heebo', sans-serif;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }

    .add-btn.whitelist-btn {
      background: var(--safe-dim);
      color: var(--whitelist-color);
      border: 1px solid var(--whitelist-color);
    }

    .add-btn.whitelist-btn:hover { background: var(--whitelist-color); color: #0d0f12; }

    .add-btn.blacklist-btn {
      background: var(--danger-dim);
      color: var(--blacklist-color);
      border: 1px solid var(--blacklist-color);
    }

    .add-btn.blacklist-btn:hover { background: var(--blacklist-color); color: #fff; }

    /* Hint text */
    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* Entries list */
    .entries {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .entry {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      gap: 10px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .entry-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .entry-dot.whitelist { background: var(--whitelist-color); }
    .entry-dot.blacklist { background: var(--blacklist-color); }

    .entry-type-icon {
      font-size: 12px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .entry-text {
      flex: 1;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: var(--text);
      direction: ltr;
      text-align: left;
    }

    .entry-scope {
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.12s;
      line-height: 1;
    }

    .del-btn:hover { background: var(--danger-dim); color: var(--danger); }

    .empty-list {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 20px;
    }

    /* Mode description */
    .mode-desc {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .mode-desc strong { color: var(--accent); }

    /* Save notification */
    .saved-toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--safe);
      color: #0d0f12;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 20px;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .saved-toast.show { transform: translateX(-50%) translateY(0); }

    /* Dimmed section */
    .list-section.dimmed { opacity: 0.35; pointer-events: none; }
  </style>
</head>
<body>

<div class="header">
  <span class="shield">🛡️</span>
  <div class="header-text">
    <h1>SendGuard – הגדרות</h1>
    <p>ניהול רשימות סינון נמענים</p>
  </div>
</div>

<!-- Mode selector -->
<div class="mode-section">
  <div class="mode-label">מצב פעולה</div>
  <div class="mode-options">
    <button class="mode-btn" id="btn-always" onclick="setMode('always')">🔔 תמיד<br>הצג אישור</button>
    <button class="mode-btn" id="btn-whitelist" onclick="setMode('whitelist')">✅ רק לרשימת<br>היתר</button>
    <button class="mode-btn" id="btn-blacklist" onclick="setMode('blacklist')">🚫 תמיד, חוץ<br>מרשימת חסימה</button>
    <button class="mode-btn" id="btn-both" onclick="setMode('both')">⚡ שתי<br>הרשימות</button>
  </div>
</div>

<div class="lists-area">

  <div class="mode-desc" id="modeDesc"></div>

  <!-- WHITELIST -->
  <div class="list-section" id="whitelistSection">
    <div class="list-header">
      <div class="list-title">
        <span class="list-badge whitelist">✅ רשימת היתר</span>
        <span class="list-desc">הצג אישור רק לנמענים אלה</span>
      </div>
      <span class="list-count" id="whiteCount">0</span>
    </div>
    <div class="hint">כתובת מלאה או דומיין (@company.com)</div>
    <div class="add-row">
      <input type="text" class="add-input whitelist-input" id="whiteInput"
        placeholder="email@domain.com או @domain.com"
        onkeydown="if(event.key==='Enter') addEntry('whitelist')"/>
      <button class="add-btn whitelist-btn" onclick="addEntry('whitelist')">+</button>
    </div>
    <div class="entries" id="whiteEntries"></div>
  </div>

  <div class="divider"></div>

  <!-- BLACKLIST -->
  <div class="list-section" id="blacklistSection">
    <div class="list-header">
      <div class="list-title">
        <span class="list-badge blacklist">🚫 רשימת חסימה</span>
        <span class="list-desc">אל תציג אישור לנמענים אלה</span>
      </div>
      <span class="list-count" id="blackCount">0</span>
    </div>
    <div class="hint">כתובת מלאה או דומיין (@company.com)</div>
    <div class="add-row">
      <input type="text" class="add-input blacklist-input" id="blackInput"
        placeholder="email@domain.com או @domain.com"
        onkeydown="if(event.key==='Enter') addEntry('blacklist')"/>
      <button class="add-btn blacklist-btn" onclick="addEntry('blacklist')">+</button>
    </div>
    <div class="entries" id="blackEntries"></div>
  </div>

</div>

<div class="saved-toast" id="toast">✓ הגדרות נשמרו</div>

<script>
  var state = {
    mode: 'always',  // 'always' | 'whitelist' | 'blacklist' | 'both'
    whitelist: [],
    blacklist: []
  };

  var modeDescriptions = {
    always: 'מצב <strong>תמיד</strong>: חלון האישור יופיע על כל שליחה, ללא קשר לנמענים.',
    whitelist: 'מצב <strong>רשימת היתר</strong>: חלון האישור יופיע <em>רק</em> כשאחד מהנמענים נמצא ברשימה. שליחות ללא נמענים מהרשימה יעברו ישירות.',
    blacklist: 'מצב <strong>רשימת חסימה</strong>: חלון האישור יופיע תמיד, <em>אלא אם כן</em> כל הנמענים נמצאים ברשימה. שימושי לסינון אנשי קשר קבועים.',
    both: 'מצב <strong>משולב</strong>: קודם בודק רשימת חסימה (לא מציג), אחר כך רשימת היתר (מציג רק אם יש התאמה). נמענים שלא ברשימות – תמיד מציג.'
  };

  Office.initialize = function() {
    loadSettings();
  };

  function loadSettings() {
    try {
      var raw = Office.context.roamingSettings.get('sendguard_settings');
      if (raw) {
        var parsed = JSON.parse(raw);
        state.mode = parsed.mode || 'always';
        state.whitelist = parsed.whitelist || [];
        state.blacklist = parsed.blacklist || [];
      }
    } catch(e) {}
    renderAll();
  }

  function saveSettings() {
    try {
      Office.context.roamingSettings.set('sendguard_settings', JSON.stringify(state));
      Office.context.roamingSettings.saveAsync(function() {
        showToast();
      });
    } catch(e) {
      showToast();
    }
  }

  function setMode(mode) {
    state.mode = mode;
    saveSettings();
    renderAll();
  }

  function renderAll() {
    // Mode buttons
    var modes = ['always','whitelist','blacklist','both'];
    modes.forEach(function(m) {
      var btn = document.getElementById('btn-' + m);
      btn.className = 'mode-btn';
      if (state.mode === m) {
        if (m === 'always') btn.classList.add('active-always');
        else if (m === 'whitelist') btn.classList.add('active-whitelist');
        else if (m === 'blacklist') btn.classList.add('active-blacklist');
        else btn.classList.add('active-always');
      }
    });

    // Mode description
    document.getElementById('modeDesc').innerHTML = modeDescriptions[state.mode];

    // Dim unused sections
    var ws = document.getElementById('whitelistSection');
    var bs = document.getElementById('blacklistSection');
    ws.classList.remove('dimmed');
    bs.classList.remove('dimmed');
    if (state.mode === 'blacklist') ws.classList.add('dimmed');
    if (state.mode === 'whitelist') bs.classList.add('dimmed');

    renderList('whitelist');
    renderList('blacklist');
  }

  function renderList(type) {
    var list = state[type];
    var container = document.getElementById(type === 'whitelist' ? 'whiteEntries' : 'blackEntries');
    var countEl = document.getElementById(type === 'whitelist' ? 'whiteCount' : 'blackCount');

    countEl.textContent = list.length;

    if (!list.length) {
      container.innerHTML = '<div class="empty-list">אין רשומות עדיין – הוסף למעלה</div>';
      return;
    }

    container.innerHTML = list.map(function(entry, i) {
      var isDomain = entry.startsWith('@');
      var icon = isDomain ? '🌐' : '✉️';
      var scope = isDomain ? 'דומיין' : 'כתובת';
      return '<div class="entry">' +
        '<div class="entry-dot ' + type + '"></div>' +
        '<span class="entry-type-icon">' + icon + '</span>' +
        '<span class="entry-text">' + escHtml(entry) + '</span>' +
        '<span class="entry-scope">' + scope + '</span>' +
        '<button class="del-btn" onclick="removeEntry(\'' + type + '\',' + i + ')" title="הסר">✕</button>' +
      '</div>';
    }).join('');
  }

  function addEntry(type) {
    var inputId = type === 'whitelist' ? 'whiteInput' : 'blackInput';
    var input = document.getElementById(inputId);
    var val = input.value.trim().toLowerCase();

    if (!val) return;

    // Auto-add @ prefix if looks like domain without it
    if (!val.includes('@') && val.includes('.')) val = '@' + val;

    // Validate
    var isDomain = val.startsWith('@');
    if (isDomain) {
      if (!/^@[a-z0-9\-\.]+\.[a-z]{2,}$/.test(val)) {
        input.style.borderColor = 'var(--danger)';
        setTimeout(function() { input.style.borderColor = ''; }, 1000);
        return;
      }
    } else {
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        input.style.borderColor = 'var(--danger)';
        setTimeout(function() { input.style.borderColor = ''; }, 1000);
        return;
      }
    }

    // Check duplicate
    if (state[type].indexOf(val) !== -1) {
      input.style.borderColor = '#f0a500';
      setTimeout(function() { input.style.borderColor = ''; }, 1000);
      return;
    }

    state[type].push(val);
    input.value = '';
    saveSettings();
    renderList(type);
  }

  function removeEntry(type, index) {
    state[type].splice(index, 1);
    saveSettings();
    renderList(type);
  }

  function showToast() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
