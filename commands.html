<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    Office.initialize = function () {};

    function onSendHandler(eventObj) {
      var item = Office.context.mailbox.item;
      var settings = loadSettings();

      var pending = 3;
      var allRecipients = { to: [], cc: [], bcc: [] };

      function checkDone() {
        pending--;
        if (pending === 0) applyFilterAndDecide(eventObj, allRecipients, settings);
      }

      item.to.getAsync(function(r) {
        if (r.status === Office.AsyncResultStatus.Succeeded) allRecipients.to = r.value;
        checkDone();
      });
      item.cc.getAsync(function(r) {
        if (r.status === Office.AsyncResultStatus.Succeeded) allRecipients.cc = r.value;
        checkDone();
      });
      item.bcc.getAsync(function(r) {
        if (r.status === Office.AsyncResultStatus.Succeeded) allRecipients.bcc = r.value;
        checkDone();
      });
    }

    function loadSettings() {
      try {
        var raw = Office.context.roamingSettings.get('sendguard_settings');
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return { mode: 'always', whitelist: [], blacklist: [] };
    }

    function getEmail(recipient) {
      return (recipient.emailAddress || recipient.email || '').toLowerCase();
    }

    function matchesEntry(email, entry) {
      // Domain: entry starts with @  (e.g. @company.com)
      if (entry.startsWith('@')) return email.endsWith(entry);
      return email === entry;
    }

    function matchesList(email, list) {
      return list.some(function(entry) { return matchesEntry(email, entry); });
    }

    function shouldShowConfirm(allRecipients, settings) {
      var mode = settings.mode || 'always';
      var whitelist = settings.whitelist || [];
      var blacklist = settings.blacklist || [];

      var allEmails = []
        .concat(allRecipients.to, allRecipients.cc, allRecipients.bcc)
        .map(getEmail).filter(Boolean);

      if (allEmails.length === 0) return true;

      switch(mode) {
        case 'always':
          return true;

        case 'whitelist':
          // Show ONLY if at least one recipient matches whitelist
          return allEmails.some(function(e) { return matchesList(e, whitelist); });

        case 'blacklist':
          // Show UNLESS all recipients are in blacklist
          return !allEmails.every(function(e) { return matchesList(e, blacklist); });

        case 'both':
          // Blacklist takes priority: if ALL are blocked -> skip
          if (allEmails.every(function(e) { return matchesList(e, blacklist); })) return false;
          // Then whitelist: show only if at least one matches (or whitelist empty = show all)
          if (whitelist.length === 0) return true;
          return allEmails.some(function(e) { return matchesList(e, whitelist); });

        default:
          return true;
      }
    }

    function applyFilterAndDecide(eventObj, allRecipients, settings) {
      if (!shouldShowConfirm(allRecipients, settings)) {
        eventObj.completed({ allowEvent: true });
        return;
      }
      showConfirmDialog(eventObj, allRecipients);
    }

    function showConfirmDialog(eventObj, allRecipients) {
      var data = {
        to: allRecipients.to.map(function(r) { return { name: r.displayName, email: r.emailAddress }; }),
        cc: allRecipients.cc.map(function(r) { return { name: r.displayName, email: r.emailAddress }; }),
        bcc: allRecipients.bcc.map(function(r) { return { name: r.displayName, email: r.emailAddress }; })
      };

      var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
      var fullUrl = 'https://Herbert1920.github.io/sendguard/dialog.html?data=' + encodeURIComponent(encoded);
      // ↑ הכתובת הזו מוחלפת אוטומטית על ידי build.py לפי config.xml

      Office.context.ui.displayDialogAsync(fullUrl, { height: 60, width: 45, displayInIframe: true }, function(result) {
        if (result.status === Office.AsyncResultStatus.Failed) {
          eventObj.completed({ allowEvent: true });
          return;
        }
        var dialog = result.value;
        dialog.addEventHandler(Office.EventType.DialogMessageReceived, function(args) {
          dialog.close();
          eventObj.completed({ allowEvent: args.message === 'confirmed' });
        });
        dialog.addEventHandler(Office.EventType.DialogEventReceived, function() {
          eventObj.completed({ allowEvent: false });
        });
      });
    }
  </script>
</head>
<body></body>
</html>
