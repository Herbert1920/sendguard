<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SendGuard – אישור שליחה</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --surface2: #1e242d;
      --border: #2a3140;
      --accent: #f0a500;
      --accent-dim: rgba(240, 165, 0, 0.12);
      --danger: #e05252;
      --danger-dim: rgba(224, 82, 82, 0.1);
      --safe: #4caf82;
      --text: #e8edf5;
      --text-muted: #7a8899;
      --text-dim: #4a5568;
      --to-color: #60a5fa;
      --cc-color: #a78bfa;
      --bcc-color: #fb923c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Heebo', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .dialog {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 24px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .shield-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      animation: pulse-border 2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240, 165, 0, 0.3); }
      50% { box-shadow: 0 0 0 6px rgba(240, 165, 0, 0); }
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* No recipients state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      text-align: center;
      padding: 40px;
    }

    .empty-icon { font-size: 40px; }

    .empty-state h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--danger);
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Recipient group */
    .group {
      margin-bottom: 16px;
    }

    .group-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .group-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid;
    }

    .group-tag.to { color: var(--to-color); border-color: var(--to-color); background: rgba(96,165,250,0.08); }
    .group-tag.cc { color: var(--cc-color); border-color: var(--cc-color); background: rgba(167,139,250,0.08); }
    .group-tag.bcc { color: var(--bcc-color); border-color: var(--bcc-color); background: rgba(251,146,60,0.08); }

    .group-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .recipients-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .recipient-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
      animation: slideIn 0.25s ease backwards;
    }

    .recipient-card:hover {
      border-color: var(--border);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .avatar.to { background: rgba(96,165,250,0.15); color: var(--to-color); }
    .avatar.cc { background: rgba(167,139,250,0.15); color: var(--cc-color); }
    .avatar.bcc { background: rgba(251,146,60,0.15); color: var(--bcc-color); }

    .recipient-info {
      flex: 1;
      min-width: 0;
    }

    .recipient-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recipient-email {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: ltr;
      text-align: right;
    }

    /* External domain warning */
    .external-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* Summary bar */
    .summary-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .summary-label {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
    }

    .summary-count {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -1px;
    }

    .summary-count span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0;
    }

    /* Warning */
    .warning-box {
      background: var(--danger-dim);
      border: 1px solid rgba(224, 82, 82, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }

    .warning-box .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .warning-box p {
      font-size: 12px;
      color: #fca5a5;
      line-height: 1.5;
    }

    /* Footer buttons */
    .footer {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 13px 20px;
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      letter-spacing: -0.2px;
    }

    .btn-cancel {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-cancel:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-confirm {
      background: var(--accent);
      color: #0d0f12;
      position: relative;
      overflow: hidden;
    }

    .btn-confirm::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    }

    .btn-confirm:hover {
      background: #f5b430;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(240, 165, 0, 0.35);
    }

    .btn-confirm:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { font-size: 13px; color: var(--text-muted); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <div class="header-text">
        <h1>SendGuard – אישור שליחה</h1>
        <p>בדוק את הנמענים לפני שליחה</p>
      </div>
    </div>

    <div class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>טוען נמענים...</p>
      </div>
    </div>

    <div class="footer">
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancel()">✕ ביטול שליחה</button>
      <button class="btn btn-confirm" id="confirmBtn" onclick="confirm()" disabled>שלח ✓</button>
    </div>
  </div>

  <script>
    Office.initialize = function() {
      loadRecipients();
    };

    var myDomain = '';

    function getInitials(name, email) {
      if (name && name.trim()) {
        var parts = name.trim().split(' ');
        if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
        return parts[0].slice(0, 2).toUpperCase();
      }
      return (email || '?').slice(0, 2).toUpperCase();
    }

    function getDomain(email) {
      var parts = (email || '').split('@');
      return parts.length === 2 ? parts[1].toLowerCase() : '';
    }

    function isExternal(email) {
      if (!myDomain || !email) return false;
      return getDomain(email) !== myDomain;
    }

    function loadRecipients() {
      // Try to read from URL params (passed from event handler)
      var params = new URLSearchParams(window.location.search);
      var dataParam = params.get('data');

      if (dataParam) {
        try {
          var decoded = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(dataParam)))));
          render(decoded.to || [], decoded.cc || [], decoded.bcc || []);
          return;
        } catch(e) {}
      }

      // Fallback: read directly from Office item (when in taskpane context)
      if (!Office.context || !Office.context.mailbox) {
        renderError();
        return;
      }

      var item = Office.context.mailbox.item;
      var userEmail = Office.context.mailbox.userProfile.emailAddress;
      myDomain = getDomain(userEmail);

      var pending = 3;
      var toList = [], ccList = [], bccList = [];

      function done() {
        pending--;
        if (pending === 0) render(toList, ccList, bccList);
      }

      item.to.getAsync(function(r) { if (r.status === 'succeeded') toList = r.value; done(); });
      item.cc.getAsync(function(r) { if (r.status === 'succeeded') ccList = r.value; done(); });
      item.bcc.getAsync(function(r) { if (r.status === 'succeeded') bccList = r.value; done(); });
    }

    function render(toList, ccList, bccList) {
      var total = toList.length + ccList.length + bccList.length;
      var externalCount = 0;

      function countExternal(list) {
        list.forEach(function(r) { if (isExternal(r.email || r.emailAddress)) externalCount++; });
      }
      countExternal(toList); countExternal(ccList); countExternal(bccList);

      var html = '';

      if (total === 0) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <h2>לא נמצאו נמענים</h2>
            <p>לא הוספת נמענים למייל.<br>הוסף נמענים לפני השליחה.</p>
          </div>`;
        document.getElementById('cancelBtn').textContent = '← חזור לעריכה';
        return;
      }

      // Summary bar
      html += `<div class="summary-bar">
        <div class="summary-label">סה"כ נמענים<br><small>לפני שליחה</small></div>
        <div class="summary-count">${total} <span>נמענים</span></div>
        ${externalCount > 0 ? `<div class="external-badge">⚠️ ${externalCount} חיצוני</div>` : ''}
      </div>`;

      // External warning
      if (externalCount > 0) {
        html += `<div class="warning-box">
          <div class="icon">⚠️</div>
          <p>שים לב: ${externalCount} מהנמענים הם מחוץ לארגון שלך. וודא שאתה שולח מידע מתאים.</p>
        </div>`;
      }

      function renderGroup(list, type, label) {
        if (!list.length) return '';
        var g = `<div class="group">
          <div class="group-label">
            <span class="group-tag ${type}">${label}</span>
            <span class="group-count">${list.length} נמענים</span>
          </div>
          <div class="recipients-list">`;

        list.forEach(function(r, i) {
          var name = r.displayName || r.name || '';
          var email = r.emailAddress || r.email || '';
          var initials = getInitials(name, email);
          var external = isExternal(email);
          var delay = i * 50;

          g += `<div class="recipient-card" style="animation-delay:${delay}ms">
            <div class="avatar ${type}">${initials}</div>
            <div class="recipient-info">
              <div class="recipient-name">${escHtml(name || email)}</div>
              ${name ? `<div class="recipient-email">${escHtml(email)}</div>` : ''}
            </div>
            ${external ? `<div class="external-badge">🌐 חיצוני</div>` : ''}
          </div>`;
        });

        g += '</div></div>';
        return g;
      }

      html += renderGroup(toList, 'to', 'אל');
      if (ccList.length) {
        html += '<div class="divider"></div>';
        html += renderGroup(ccList, 'cc', 'CC');
      }
      if (bccList.length) {
        html += '<div class="divider"></div>';
        html += renderGroup(bccList, 'bcc', 'BCC');
      }

      document.getElementById('content').innerHTML = html;
      document.getElementById('confirmBtn').disabled = false;
    }

    function escHtml(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderError() {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">❌</div>
          <h2>שגיאה בטעינה</h2>
          <p>לא ניתן לטעון את הנמענים. נא לסגור ולנסות שוב.</p>
        </div>`;
    }

    function confirm() {
      var btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = '⏳ שולח...';
      Office.context.ui.messageParent('confirmed');
    }

    function cancel() {
      Office.context.ui.messageParent('cancelled');
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !document.getElementById('confirmBtn').disabled) confirm();
      if (e.key === 'Escape') cancel();
    });
  </script>
</body>
</html>
